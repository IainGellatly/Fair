<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map / Floorplan Gallery Test</title>
<style>
body{
  font-family:sans-serif;
  margin:20px;
}

.viewer-wrap{
  position:relative;
  width:min(90vw,700px);
  height:min(75vh,700px);
  margin:0 auto;
  border:2px solid #777;
  overflow:hidden;
}

#viewer{
  width:100%;
  height:100%;
}

#rescueBtn{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:56px;
  height:56px;
  border-radius:50%;
  border:none;
  font-size:28px;
  font-weight:bold;
  z-index:99999;
  cursor:pointer;
}

.button-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-top:12px;
}

.button-row button{
  padding:10px 14px;
  cursor:pointer;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<h2>Map / Building Gallery Test</h2>

<div class="viewer-wrap">
  <div id="viewer"></div>
</div>

<button id="rescueBtn" title="Rescue">X</button>

<div class="button-row">
  <button data-img="fair">Fair Map</button>
  <button data-img="floral">Floral Hall</button>
  <button data-img="c1">Commercial 1</button>
  <button data-img="c2">Commercial 2</button>
</div>

<script>
const images = {
  fair: "/static/maps/fair_map.webp",
  floral: "/static/maps/floral_plan.webp",
  c1: "/static/maps/commercial_1_plan.webp",
  c2: "/static/maps/commercial_2_plan.webp"
};

let map = L.map('viewer', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
});

let overlay;
let bounds;

function loadImage(key){

  const img = new Image();

  img.onload = () => {

    if (overlay){
      map.removeLayer(overlay);
    }

    const w = img.width;
    const h = img.height;

    bounds = [[0,0],[h,w]];

    overlay = L.imageOverlay(images[key], bounds).addTo(map);

    map.setMaxBounds(bounds);

    map.fitBounds(bounds);

  };

  img.src = images[key];
}

document.querySelectorAll('[data-img]').forEach(btn => {
  btn.addEventListener('click', () => loadImage(btn.dataset.img));
});

document.getElementById('rescueBtn').addEventListener('click', () => {

  if(bounds){
    map.fitBounds(bounds);
  }

  document.querySelector('.button-row').scrollIntoView({
    block:'nearest',
    behavior:'instant'
  });

});

loadImage('fair');
</script>

</body>
</html>
